[workspace]
name = "obra-dinn-head-tracking"
version = "1.0.0"
description = "Head tracking mod for Return of the Obra Dinn using CameraUnlock shared library"
channels = ["conda-forge"]
platforms = ["win-64"]

[tasks]
sync = "git submodule update --remote shared"
restore = "dotnet restore src/ObraDinnHeadTracking/ObraDinnHeadTracking.csproj"
build = { cmd = "dotnet build src/ObraDinnHeadTracking/ObraDinnHeadTracking.csproj -c Release", depends-on = ["restore"] }
install = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/deploy.ps1 Release", depends-on = ["build"] }
package = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/package-release.ps1", depends-on = ["build"] }
uninstall = "scripts\\uninstall.cmd"
clean = "dotnet clean src/ObraDinnHeadTracking/ObraDinnHeadTracking.csproj"
release = "powershell -ExecutionPolicy Bypass -File scripts/release.ps1"
release-force = "powershell -ExecutionPolicy Bypass -File scripts/release.ps1 -Force"
show-changelog = "powershell -ExecutionPolicy Bypass -File scripts/show-changelog.ps1"
